<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Renuka Fashion Studio</title>

<!-- Flatpickr (Beautiful Date Picker) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<style>
body { font-family: Arial; background:#F5EFE6; padding:20px; }
.container { max-width:400px; margin:auto; background:#fff; padding:20px; border-radius:12px; }
label { font-weight:bold; display:block; margin-top:10px; }
input, textarea { width:100%; padding:10px; margin-top:5px; border-radius:8px; border:1px solid #ccc; }
button { margin-top:15px; padding:12px; width:100%; border:none; border-radius:10px; background:#25D366; color:#fff; font-size:16px; }
.chips { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
.chip { padding:8px 12px; border:1px solid #ccc; border-radius:20px; cursor:pointer; }
.chip.active { background:#6B4423; color:#fff; }
</style>
</head>

<body>

<div class="container">
<h2>Place Order</h2>

<label>Name</label>
<input id="name" placeholder="Your name">

<label>Phone</label>
<input id="phone" placeholder="Phone number">

<label>Select Services</label>
<div class="chips">
<div class="chip" onclick="selectService(this,'Frock')">Frock</div>
<div class="chip" onclick="selectService(this,'Kurti')">Kurti</div>
<div class="chip" onclick="selectService(this,'Lehenga')">Lehenga</div>
<div class="chip" onclick="selectService(this,'Blouse')">Blouse</div>
<div class="chip" onclick="selectService(this,'Saree Draping')">Saree Draping</div>
<div class="chip" onclick="selectService(this,'Mehendi')">Mehendi</div>
</div>

<label>Measurements</label>
<input id="size" placeholder="Bust, Waist, etc">

<label>Expected Date</label>
<input id="date" placeholder="Select date">

<label>Instructions</label>
<textarea id="note" placeholder="Design details"></textarea>

<button onclick="sendOrder()">Send via WhatsApp</button>
</div>

<script>

// WhatsApp Number
const WHATSAPP = '919940539180';
let services = [];

function selectService(el, name){
  el.classList.toggle('active');
  if(services.includes(name)){
    services = services.filter(s=>s!==name);
  } else {
    services.push(name);
  }
}

// Flatpickr init
flatpickr("#date", {
  dateFormat: "d M Y",
  minDate: "today"
});

function sendOrder(){
  const name = document.getElementById('name').value;
  const phone = document.getElementById('phone').value;
  const size = document.getElementById('size').value;
  const date = document.getElementById('date').value;
  const note = document.getElementById('note').value;

  if(!name || !phone || services.length===0){
    alert('Please fill required fields');
    return;
  }

  const msg = `New Order%0A
Name: ${name}%0APhone: ${phone}%0AServices: ${services.join(', ')}%0AMeasurements: ${size}%0ADate: ${date}%0ANotes: ${note}`;

  window.open(`https://wa.me/${WHATSAPP}?text=${msg}`);
}

</script>

</body>
</html>
